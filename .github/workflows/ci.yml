name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# contents: write -> push report to gh-pages. pull-requests: write -> PR comment.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Fast quality gate: lint + format ------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: black --check .

  # ---- UI tests -> HTML report -> gh-pages + PR comment --------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      # Headless in CI (HEADLESS defaults true — no committed .env). The live VarSome
      # tests are skipped here anyway (rate limit + reCAPTCHA).
      - name: Run tests and generate HTML report
        run: |
          set +e
          pytest -m regression --reruns 2 --reruns-delay 3
          echo "PYTEST_EXIT_CODE=$?" >> "$GITHUB_ENV"

      - name: Upload HTML report (downloadable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.html
          if-no-files-found: warn

      # Publish to the gh-pages branch under reports/<branch>/<run>/index.html.
      # reports/ is gitignored, so report.html survives the branch switch; we also
      # stash a copy to be safe.
      - name: Deploy report to gh-pages
        if: always()
        run: |
          if [ ! -f reports/report.html ]; then echo "no report, skip"; exit 0; fi
          cp reports/report.html /tmp/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages
          DIR="reports/${BRANCH_NAME}/${{ github.run_number }}"
          mkdir -p "$DIR"
          cp /tmp/index.html "$DIR/index.html"
          git add "$DIR/index.html"
          git commit -m "report: ${BRANCH_NAME} run ${{ github.run_number }}"
          git push origin gh-pages

      - name: Comment report link on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          PYTEST_EXIT_CODE: ${{ env.PYTEST_EXIT_CODE }}
        with:
          script: |
            const { BRANCH_NAME, RUN_NUMBER, RUN_ID, PYTEST_EXIT_CODE } = process.env;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const url = `https://${owner}.github.io/${repo}/reports/${BRANCH_NAME}/${RUN_NUMBER}/index.html`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${RUN_ID}`;
            const passed = PYTEST_EXIT_CODE === "0";
            const body = [
              "### VarSome UI test report",
              "",
              `- **Result:** ${passed ? "✅ passed" : "❌ failed"}`,
              `- **Report:** [View HTML report](${url})`,
              `- **Branch:** \`${BRANCH_NAME}\``,
              `- **Commit:** \`${context.sha}\``,
              `- **Environment:** ubuntu-latest · Python 3.12 · Chrome (headless)`,
              `- **Run:** [#${RUN_NUMBER}](${runUrl})`,
              `- **When:** ${new Date().toISOString()}`,
              "",
              "> Live VarSome tests are skipped in CI (rate limit + reCAPTCHA).",
            ].join("\n");
            await github.rest.issues.createComment({
              owner, repo, issue_number: context.issue.number, body,
            });

      - name: Fail job if tests failed
        if: always() && env.PYTEST_EXIT_CODE != '0'
        run: exit 1
