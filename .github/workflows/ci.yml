name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# contents: write -> push report to gh-pages. pull-requests: write -> PR comment.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Fast quality gate: lint + format ------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: black --check .

  # ---- UI tests -> HTML report -> gh-pages + PR comment --------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      # Headless in CI (HEADLESS defaults true — no committed .env). The live VarSome
      # tests are skipped here anyway (rate limit + reCAPTCHA).
      - name: Run tests and generate HTML report
        run: |
          set +e
          pytest -m regression --reruns 2 --reruns-delay 3 --junitxml=reports/junit.xml
          echo "PYTEST_EXIT_CODE=$?" >> "$GITHUB_ENV"

      - name: Summarize results
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import xml.etree.ElementTree as ET
          try:
              s = ET.parse("reports/junit.xml").getroot()
              s = s.find("testsuite") if s.tag == "testsuites" else s
              total = int(s.get("tests", 0)); fail = int(s.get("failures", 0))
              err = int(s.get("errors", 0)); skip = int(s.get("skipped", 0))
              dur = float(s.get("time", 0.0))
              print(f"TESTS_TOTAL={total}")
              print(f"TESTS_PASSED={total - fail - err - skip}")
              print(f"TESTS_FAILED={fail + err}")
              print(f"TESTS_SKIPPED={skip}")
              print(f"TESTS_DURATION={dur:.1f}s")
          except Exception as exc:
              print(f"TESTS_TOTAL=?\nTESTS_PASSED=?\nTESTS_FAILED=?\nTESTS_SKIPPED=?\nTESTS_DURATION=?  # {exc}")
          PY

      - name: Upload HTML report (downloadable)
        if: always()
        id: report_artifact
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.html
          if-no-files-found: warn

      # Publish to the gh-pages branch under reports/<branch>/<run>/index.html.
      # reports/ is gitignored, so report.html survives the branch switch; we also
      # stash a copy to be safe.
      - name: Deploy report to gh-pages
        if: always()
        run: |
          if [ ! -f reports/report.html ]; then echo "no report, skip"; exit 0; fi
          cp reports/report.html /tmp/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages
          DIR="reports/${BRANCH_NAME}/${{ github.run_number }}"
          mkdir -p "$DIR"
          cp /tmp/index.html "$DIR/index.html"
          git add "$DIR/index.html"
          git commit -m "report: ${BRANCH_NAME} run ${{ github.run_number }}"
          git push origin gh-pages

      - name: Comment report link on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
          BASE_REF: ${{ github.base_ref }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          ACTOR: ${{ github.actor }}
          PYTEST_EXIT_CODE: ${{ env.PYTEST_EXIT_CODE }}
          ARTIFACT_URL: ${{ steps.report_artifact.outputs.artifact-url }}
          T_TOTAL: ${{ env.TESTS_TOTAL }}
          T_PASSED: ${{ env.TESTS_PASSED }}
          T_FAILED: ${{ env.TESTS_FAILED }}
          T_SKIPPED: ${{ env.TESTS_SKIPPED }}
          T_DURATION: ${{ env.TESTS_DURATION }}
        with:
          script: |
            const e = process.env;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pagesUrl = `https://${owner}.github.io/${repo}/reports/${e.BRANCH_NAME}/${e.RUN_NUMBER}/index.html`;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${e.RUN_ID}`;
            const passed = e.PYTEST_EXIT_CODE === "0";
            const rows = [
              ["Result", passed ? "✅ passed" : "❌ failed"],
              ["Tests", `${e.T_PASSED} passed · ${e.T_FAILED} failed · ${e.T_SKIPPED} skipped (of ${e.T_TOTAL})`],
              ["Duration", e.T_DURATION],
              ["Report (Pages)", `[View HTML report](${pagesUrl})`],
              ["Report (download)", e.ARTIFACT_URL ? `[Download report.html](${e.ARTIFACT_URL})` : "n/a"],
              ["Repository", `\`${owner}/${repo}\``],
              ["Branch", `\`${e.BRANCH_NAME}\`${e.BASE_REF ? ` → \`${e.BASE_REF}\`` : ""}`],
              ["Commit", `\`${context.sha}\``],
              ["Triggered by", `@${e.ACTOR}`],
              ["Environment", "ubuntu-latest · Python 3.12 · Chrome (headless)"],
              ["Run", `[#${e.RUN_NUMBER}](${runUrl}) (attempt ${e.RUN_ATTEMPT})`],
              ["When", new Date().toUTCString()],
            ];
            const body = [
              "### VarSome UI test report",
              "",
              "| | |",
              "|---|---|",
              ...rows.map(([k, v]) => `| **${k}** | ${v} |`),
              "",
              "> Live VarSome tests are skipped in CI (rate limit + reCAPTCHA); the report",
              "> above is this run's self-contained HTML (screenshots + logs embedded).",
            ].join("\n");
            await github.rest.issues.createComment({
              owner, repo, issue_number: context.issue.number, body,
            });

      - name: Fail job if tests failed
        if: always() && env.PYTEST_EXIT_CODE != '0'
        run: exit 1
