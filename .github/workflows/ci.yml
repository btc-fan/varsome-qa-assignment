name: CI

# Run on every push to main and on pull requests.
on:
  push:
    branches: [main]
  pull_request:

# contents: write -> push the report to the gh-pages branch. pull-requests: write -> PR comment.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Fast quality gate: lint + format ------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: black --check .

  # ---- UI tests -> HTML report -> gh-pages + PR comment --------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      # Headless in CI (HEADLESS defaults true — no committed .env). The live VarSome
      # tests are skipped here anyway (rate limit + reCAPTCHA).
      - name: Run suite (headless)
        id: pytest
        continue-on-error: true # keep going so the report still publishes on failure
        run: pytest -m regression --reruns 2 --reruns-delay 3

      # Self-contained HTML report (screenshots + logs embedded). index.html = folder root.
      - name: Build report site
        if: always()
        run: |
          mkdir -p site
          cp reports/report.html site/index.html

      - name: Upload HTML report (downloadable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.html
          if-no-files-found: warn

      # Publish to the gh-pages branch under a per-run folder (Pages source = branch).
      # keep_files preserves previous runs, so every run has a permanent URL.
      - name: Publish report to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          destination_dir: ${{ github.run_number }}
          keep_files: true

      - name: Comment report link on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-report
          recreate: true # delete the old one and post fresh, so it is the last comment
          message: |
            ### VarSome UI test report

            | | |
            |---|---|
            | **Result** | ${{ steps.pytest.outcome == 'success' && '✅ passed' || '❌ failed' }} |
            | **Report** | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }}/ |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.sha }}` |
            | **Environment** | ubuntu-latest · Python 3.12 · Chrome (headless) |
            | **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | **When** | ${{ github.run_started_at }} |

            > Live VarSome tests are skipped in CI (rate limit + reCAPTCHA); the report
            > above is this run's HTML report published to GitHub Pages.

      - name: Fail job if tests failed
        if: always() && steps.pytest.outcome != 'success'
        run: exit 1
