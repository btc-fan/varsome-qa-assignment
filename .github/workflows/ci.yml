name: CI

# Run on every push to main and on pull requests.
on:
  push:
    branches: [main]
  pull_request:

# Pages deploy needs pages + id-token; PR comment needs pull-requests.
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Fast quality gate: lint + format ------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: black --check .

  # ---- UI tests + build the report site ------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      result: ${{ steps.pytest.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      # Headless in CI (HEADLESS defaults true — no committed .env). The live VarSome
      # tests are skipped here anyway (rate limit + reCAPTCHA).
      - name: Run suite (headless)
        id: pytest
        continue-on-error: true # keep going so the report still publishes on failure
        run: pytest -m regression --reruns 2 --reruns-delay 3

      # Self-contained HTML report (screenshots + logs embedded). index.html = site root.
      - name: Build report site
        if: always()
        run: |
          mkdir -p site
          cp reports/report.html site/index.html

      - name: Upload HTML report (downloadable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.html
          if-no-files-found: warn

      - name: Configure Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Fail job if tests failed
        if: always() && steps.pytest.outcome != 'success'
        run: exit 1

  # ---- Publish the report to GitHub Pages + comment on the PR --------------
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment report link on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-report
          message: |
            ### VarSome UI test report

            | | |
            |---|---|
            | **Result** | ${{ needs.test.outputs.result == 'success' && '✅ passed' || '❌ failed' }} |
            | **Report** | ${{ steps.deployment.outputs.page_url }} |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.sha }}` |
            | **Environment** | ubuntu-latest · Python 3.12 · Chrome (headless) |
            | **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | **When** | ${{ github.run_started_at }} |

            > Live VarSome tests are skipped in CI (rate limit + reCAPTCHA). The report
            > above is the latest run; per-run reports are also on the run's artifacts.
